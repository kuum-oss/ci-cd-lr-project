name: Release and Update README

on:
  push:
    branches: [ main ]
    # Запускаємо тільки якщо це не автоматичний коміт від самого себе (щоб уникнути рекурсії при оновленні README)
    # Але зазвичай GitHub Actions самі це роблять через GITHUB_TOKEN.
    # Найкраще перевіряти pull_request_merge, але push у main після PR — теж ок.

jobs:
  release:
    if: github.event_name == 'push' && !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get Joke
        id: joke
        run: |
          JOKE=$(curl -s https://api.chucknorris.io/jokes/random | jq -r '.value')
          echo "joke=$JOKE" >> $GITHUB_OUTPUT

      - name: Get PR Info
        id: pr_info
        run: |
          # Спробуємо знайти PR, пов'язаний з цим комітом
          PR_TITLE=$(git log -1 --pretty=%s)
          # Якщо це merge commit, він зазвичай має назву "Merge pull request #X from branch"
          # Спробуємо отримати оригінальний заголовок PR через GitHub API або останній коміт
          echo "title=$PR_TITLE" >> $GITHUB_OUTPUT

      - name: Create Version
        id: version
        run: |
          VERSION="v1.0.${{ github.run_number }}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Update README
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PR_TITLE="${{ steps.pr_info.outputs.title }}"
          JOKE="${{ steps.joke.outputs.joke }}"
          
          # Видаляємо старий блок, якщо він є, і додаємо новий
          # Шукаємо заголовок ## Latest Release Info і все під ним до кінця або наступного ##
          # Простіше просто перезаписати або додати в кінець, якщо ми знаємо структуру.
          # В даному випадку в README вже є блок в кінці.
          
          sed -i '/## Latest Release Info/,$d' README.md
          
          echo "## Latest Release Info" >> README.md
          echo "- Version: $VERSION" >> README.md
          echo "- PR Title: $PR_TITLE" >> README.md
          echo "- Chuck Norris Joke: $JOKE" >> README.md

      - name: Commit and Push README
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: update README with release info $VERSION [skip ci]" || echo "No changes to commit"
          git push

      - name: Create Tag
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git tag $VERSION
          git push origin $VERSION

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          body: |
            ### Release Details
            - **PR Title:** ${{ steps.pr_info.outputs.title }}
            - **Chuck Norris Joke:** ${{ steps.joke.outputs.joke }}
          token: ${{ secrets.GITHUB_TOKEN }}
