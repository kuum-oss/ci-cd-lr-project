name: Release and Update README

on:
  push:
    branches: [ main ]

jobs:
  release:
    if: github.event_name == 'push' && !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get Joke
        id: joke
        run: |
          JOKE=$(curl -s https://api.chucknorris.io/jokes/random | jq -r '.value')
          echo "joke=$JOKE" >> $GITHUB_OUTPUT

      - name: Get PR Info
        id: pr_info
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Спробуємо отримати заголовок PR через GitHub CLI
          PR_TITLE=$(gh pr list --base main --state merged --limit 1 --json title --template '{{range .}}{{.title}}{{end}}')
          
          # Якщо PR_TITLE порожній (наприклад, прямий пуш у main), використаємо повідомлення коміту
          if [ -z "$PR_TITLE" ]; then
            PR_TITLE=$(git log -1 --pretty=%s)
          fi
          
          echo "title=$PR_TITLE" >> $GITHUB_OUTPUT

      - name: Create Version
        id: version
        run: |
          VERSION="v1.0.${{ github.run_number }}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Update README
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PR_TITLE="${{ steps.pr_info.outputs.title }}"
          JOKE="${{ steps.joke.outputs.joke }}"
          
          # Оновлюємо README.md: видаляємо старий блок і додаємо новий.
          # Використовуємо perl для надійнішої багаторядкової заміни або просто sed.
          # Оскільки блок в кінці, sed '/## Latest Release Info/,$d' спрацює.
          
          if grep -q "## Latest Release Info" README.md; then
            sed -i '/## Latest Release Info/,$d' README.md
          fi
          
          # Видаляємо зайві порожні рядки в кінці перед додаванням
          sed -i -e :a -e '/^\n*$/{$d;N;ba' -e '}' README.md

          echo "" >> README.md
          echo "## Latest Release Info" >> README.md
          echo "- Version: $VERSION" >> README.md
          echo "- PR Title: $PR_TITLE" >> README.md
          echo "- Chuck Norris Joke: $JOKE" >> README.md

      - name: Commit and Push README
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: update README with release info $VERSION [skip ci]" || echo "No changes to commit"
          git push

      - name: Create Tag
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git tag $VERSION
          git push origin $VERSION

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          body: |
            ### Release Details
            - **PR Title:** ${{ steps.pr_info.outputs.title }}
            - **Chuck Norris Joke:** ${{ steps.joke.outputs.joke }}
          token: ${{ secrets.GITHUB_TOKEN }}
